# path to the JSON file containing mount points
# absolute path: mount=c:/mount.json
# bare filename (resolved from portable_config/script-opts/): mount=mount.json
mount=mount.json

# autoload config: whether to include images
image=yes

# autoload config: whether to include videos
video=yes

# autoload config: whether to include audio files
audio=yes

# autoload config: max playlist size
maxSize=32

# script-message event name
mountEventName=mount
